name: HearthAI
options:
  bundleIdPrefix: ai.hearth
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    visionOS: "1.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    XROS_DEPLOYMENT_TARGET: "1.0"
    DEVELOPMENT_TEAM: ""
    EXCLUDED_ARCHS[sdk=iphonesimulator*]: "x86_64"
    SUPPORTS_MACCATALYST: "NO"

packages:
  LlamaCpp:
    path: Packages/LlamaCpp

targets:
  HearthAI:
    type: application
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: HearthAI
    resources:
      - path: HearthAI/Resources
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: "Hearth AI"
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
    dependencies:
      - package: LlamaCpp

  HearthAITests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS, visionOS]
    sources:
      - path: HearthAITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
      configs:
        debug:
          TEST_HOST[sdk=macosx*]: "$(BUILT_PRODUCTS_DIR)/HearthAI.app/Contents/MacOS/HearthAI"
          BUNDLE_LOADER[sdk=macosx*]: "$(BUILT_PRODUCTS_DIR)/HearthAI.app/Contents/MacOS/HearthAI"
        release:
          TEST_HOST[sdk=macosx*]: "$(BUILT_PRODUCTS_DIR)/HearthAI.app/Contents/MacOS/HearthAI"
          BUNDLE_LOADER[sdk=macosx*]: "$(BUILT_PRODUCTS_DIR)/HearthAI.app/Contents/MacOS/HearthAI"
    dependencies:
      - target: HearthAI

schemes:
  HearthAI:
    build:
      targets:
        HearthAI: all
        HearthAITests: [test]
    test:
      targets:
        - HearthAITests
