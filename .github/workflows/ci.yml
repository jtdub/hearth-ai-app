name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using Xcode at: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build llama.cpp XCFramework
        run: bash scripts/build-xcframework.sh

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Find Simulator
        id: simulator
        run: |
          # Find the first available iPhone simulator
          DEST=$(xcrun simctl list devices available -j | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          " 2>/dev/null || echo "")
          if [ -z "$DEST" ]; then
            echo "No iPhone simulator found, using generic destination"
            echo "destination=generic/platform=iOS Simulator" >> "$GITHUB_OUTPUT"
          else
            echo "Found simulator: $DEST"
            echo "destination=platform=iOS Simulator,name=$DEST" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: |
          xcodebuild build \
            -project HearthAI.xcodeproj \
            -scheme HearthAI \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS='x86_64'

      - name: Test
        timeout-minutes: 10
        run: |
          xcodebuild test \
            -project HearthAI.xcodeproj \
            -scheme HearthAI \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -quiet \
            CODE_SIGNING_ALLOWED=NO \
            EXCLUDED_ARCHS='x86_64'
