included:
  - HearthAI
  - HearthAITests
  - Packages/LlamaCpp/Sources/LlamaCpp

excluded:
  - HearthAI.xcodeproj
  - Packages/LlamaCpp/Sources/CLlama
  - Packages/LlamaCpp/vendored
  - Packages/LlamaCpp/.build

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - empty_count
  - force_unwrapping
  - implicit_return

line_length:
  warning: 120
  error: 150

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100
